<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Agent Web</title>

    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- Highlight.js for code highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="stars-container" id="starsContainer"></div>
    <div class="deer-bg"></div>

    <div class="header">
        <h1>Simple Agent</h1>
        <div class="header-actions">
            <button class="btn btn-secondary" onclick="loadSessions()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 21"/>
                    <path d="M21 3v9h-9"/>
                    <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 3"/>
                    <path d="M8 16H3v5"/>
                </svg>
                Refresh
            </button>
            <button class="btn btn-primary" onclick="newSession()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                New Chat
            </button>
        </div>
    </div>

    <div class="chat-container">
        <div class="sidebar">
            <div class="sidebar-header">
                Sessions
            </div>
            <div class="session-list" id="sessionList">
                <!-- Sessions loaded here -->
            </div>
        </div>

        <div class="messages-container">
            <div class="messages" id="messages">
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    </svg>
                    <p>Start a new session to begin</p>
                </div>
            </div>

            <div class="status-bar">
                <div class="status-left">
                    <span class="status-indicator" id="statusIndicator"></span>
                    <span id="statusText">已断开</span>
                </div>
                <span id="sessionInfo"></span>
            </div>

            <div class="input-container">
                <div class="input-wrapper">
                    <input
                        type="text"
                        id="messageInput"
                        placeholder="输入消息... (Shift+Enter 换行，可拖拽或粘贴图片)"
                        onkeypress="handleKeyPress(event)"
                    />
                    <input type="file" id="imageInput" accept="image/*" multiple style="display: none;" onchange="handleImageFileSelect(event)" />
                    <button class="btn btn-image" onclick="document.getElementById('imageInput').click()" title="上传图片">
                        <span>🖼️</span>
                    </button>
                    <button class="btn btn-primary" onclick="sendMessage()">
                        <span>📤</span> 发送
                    </button>
                </div>
                <div class="image-preview-container" id="imagePreviewContainer"></div>
            </div>
        </div>
    </div>

    <!-- Custom App Script -->
    <script src="app.js"></script>
</body>
</html>
