<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Claw Web</title>

    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- Highlight.js for code highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="stars-container" id="starsContainer"></div>

    <div class="header">
        <h1>Simple Claw</h1>
        <div class="header-actions">
            <a href="https://github.com/KuroAkuta/Simple-Langgraph-Agent-with-Skills" target="_blank" class="btn btn-secondary" title="View on GitHub">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                </svg>
                GitHub
            </a>
            <button class="btn btn-secondary" onclick="toggleKnowledgePanel()" title="知识库管理">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                </svg>
                知识库
            </button>
            <button class="btn btn-secondary" onclick="loadSessions()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 21"/>
                    <path d="M21 3v9h-9"/>
                    <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 3"/>
                    <path d="M8 16H3v5"/>
                </svg>
                Refresh
            </button>
            <button class="btn btn-primary" onclick="newSession()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                New Chat
            </button>
        </div>
    </div>

    <div class="chat-container">
        <!-- 知识库侧边栏 -->
        <div class="knowledge-sidebar collapsed" id="knowledgeSidebar">
            <div class="sidebar-header">
                <div class="sidebar-header-title">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                    </svg>
                    知识库
                </div>
                <button class="btn btn-sm btn-primary" onclick="showCreateKnowledgeModal()">+</button>
            </div>
            <div class="knowledge-list" id="knowledgeList">
                <!-- 知识库列表 -->
            </div>
        </div>

        <div class="sidebar">
            <div class="sidebar-header">
                Sessions
            </div>
            <div class="session-list" id="sessionList">
                <!-- Sessions loaded here -->
            </div>
        </div>

        <div class="messages-container">
            <div class="messages" id="messages">
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    </svg>
                    <p>Start a new session to begin</p>
                </div>
            </div>

            <div class="status-bar">
                <div class="status-left">
                    <span class="status-indicator" id="statusIndicator"></span>
                    <span id="statusText">已断开</span>
                </div>
                <span id="sessionInfo"></span>
            </div>

            <div class="input-container">
                <!-- 知识库选择器 -->
                <div class="knowledge-selector" id="knowledgeSelector" onclick="toggleKnowledgeSelector(event)">
                    <span class="knowledge-selector-label">
                        <span class="chevron">▼</span>
                        启用知识库：<span id="enabledKnowledgeCount">0</span>/ <span id="totalKnowledgeCount">0</span> 已选择
                    </span>
                    <div class="knowledge-checkboxes-wrapper">
                        <div class="knowledge-checkboxes" id="knowledgeCheckboxes">
                            <span class="text-muted">暂无知识库</span>
                        </div>
                    </div>
                </div>

                <div class="input-wrapper">
                    <textarea
                        id="messageInput"
                        placeholder="输入消息... (Shift+Enter 换行，可拖拽或粘贴图片)"
                        rows="3"
                        onkeydown="handleKeyPress(event)"
                        oninput="autoResizeTextarea(this)"
                    ></textarea>
                    <input type="file" id="imageInput" accept="image/*" multiple style="display: none;" onchange="handleImageFileSelect(event)" />
                    <button class="btn btn-image" onclick="document.getElementById('imageInput').click()" title="上传图片">
                        <span>🖼️</span>
                    </button>
                    <button class="btn btn-primary" onclick="sendMessage()">
                        <span>📤</span> 发送
                    </button>
                </div>
                <div class="image-preview-container" id="imagePreviewContainer"></div>
            </div>
        </div>
    </div>

    <!-- 创建知识库 Modal -->
    <div id="createKnowledgeModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>创建新知识库</h3>
                <button class="modal-close" onclick="closeCreateKnowledgeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>知识库名称</label>
                    <input type="text" id="newKnowledgeName" placeholder="例如：项目文档" />
                </div>
                <div class="form-group">
                    <label>描述（可选）</label>
                    <textarea id="newKnowledgeDesc" placeholder="简要描述知识库用途" rows="3"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeCreateKnowledgeModal()">取消</button>
                <button class="btn btn-primary" onclick="createKnowledgeBase()">创建</button>
            </div>
        </div>
    </div>

    <!-- 编辑知识库 Modal -->
    <div id="editKnowledgeModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>编辑知识库</h3>
                <button class="modal-close" onclick="closeEditKnowledgeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>知识库名称</label>
                    <input type="text" id="editKnowledgeName" placeholder="例如：项目文档" />
                </div>
                <div class="form-group">
                    <label>描述（可选）</label>
                    <textarea id="editKnowledgeDesc" placeholder="简要描述知识库用途" rows="3"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeEditKnowledgeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveEditKnowledgeBase()">保存</button>
            </div>
        </div>
    </div>

    <!-- 子 agent 任务悬浮窗 -->
    <div id="subagentTaskFloat" class="subagent-float" style="display: none;">
        <div class="subagent-float-header">
            <div class="subagent-float-title">
                <span class="status-dot running" id="subagentFloatStatusDot"></span>
                <span id="subagentFloatTitle">子 agent 运行中</span>
            </div>
            <div class="subagent-float-actions">
                <button class="btn-float-action" onclick="toggleSubagentFloatDetail()" title="查看详情">📋</button>
                <button class="btn-float-close" onclick="closeSubagentFloat()" title="关闭">✕</button>
            </div>
        </div>
        <div class="subagent-float-content" id="subagentFloatContent">
            <div class="subagent-float-task">
                <span class="subagent-float-label">任务:</span>
                <span id="subagentFloatTaskName" class="subagent-float-task-name">-</span>
            </div>
            <div class="subagent-float-task">
                <span class="subagent-float-label">类型:</span>
                <span id="subagentFloatTaskType" class="subagent-float-badge">general-purpose</span>
            </div>
            <div class="subagent-float-progress">
                <div class="progress-bar-mini">
                    <div class="progress-fill-mini" id="subagentFloatProgress"></div>
                </div>
                <div class="subagent-float-meta">
                    <span id="subagentFloatTime">0s</span>
                </div>
            </div>
            <!-- 工具执行日志区域 -->
            <div class="subagent-tool-log" id="subagentToolLog" style="display: none;">
                <div class="subagent-tool-log-header">
                    <span>🔧 工具执行</span>
                    <span class="subagent-tool-count" id="subagentToolCount">0</span>
                </div>
                <div class="subagent-tool-log-content" id="subagentToolLogContent">
                </div>
            </div>
        </div>
    </div>

    <!-- 子 agent 任务详情 Modal (可选查看) -->
    <div id="subagentTaskModal" class="modal" style="display: none;">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h3>🤖 子 agent 任务详情</h3>
                <button class="modal-close" onclick="closeSubagentTaskModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div id="subagentModalContent">
                    <!-- 动态填充内容 -->
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="subagentCancelBtn" onclick="cancelSubagentTask()">取消任务</button>
                <button class="btn btn-primary" onclick="closeSubagentTaskModal()">关闭</button>
            </div>
        </div>
    </div>

    <!-- 知识库详情 Modal -->
    <div id="knowledgeDetailModal" class="modal" style="display: none;">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h3 id="knowledgeDetailTitle">知识库详情</h3>
                <button class="modal-close" onclick="closeKnowledgeDetailModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="knowledge-detail-header">
                    <div class="knowledge-meta">
                        <span id="knowledgeDetailDesc"></span>
                    </div>
                    <div class="knowledge-actions">
                        <button class="btn btn-sm btn-secondary" onclick="uploadDocument()">📄 上传文档</button>
                        <input type="file" id="documentUploadInput" style="display: none;" onchange="handleDocumentUpload(event)" />
                        <button class="btn btn-sm btn-primary" onclick="triggerIndexing('incremental')">增量索引</button>
                        <button class="btn btn-sm btn-warning" onclick="triggerIndexing('full')">全量索引</button>
                    </div>
                </div>
                <div class="indexing-status" id="indexingStatus">
                    <!-- 索引状态 -->
                </div>
                <div class="document-list" id="documentList">
                    <!-- 文档列表 -->
                </div>
            </div>
        </div>
    </div>

    <!-- Custom App Script -->
    <script src="app.js"></script>
    <script>
        // Modal close handlers - click outside to close
        document.addEventListener('click', (e) => {
            if (e.target.id === 'createKnowledgeModal') {
                closeCreateKnowledgeModal();
            }
            if (e.target.id === 'editKnowledgeModal') {
                closeEditKnowledgeModal();
            }
            if (e.target.id === 'knowledgeDetailModal') {
                closeKnowledgeDetailModal();
            }
        });

        // Handle escape key to close modals
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeCreateKnowledgeModal();
                closeEditKnowledgeModal();
                closeKnowledgeDetailModal();
            }
        });
    </script>
</body>
</html>
