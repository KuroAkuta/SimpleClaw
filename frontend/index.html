<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Agent Web</title>

    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- Highlight.js for code highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="stars-container" id="starsContainer"></div>
    <div class="deer-bg"></div>

    <div class="header">
        <h1>Simple Agent</h1>
        <div class="header-actions">
            <button class="btn btn-secondary" onclick="toggleKnowledgePanel()" title="知识库管理">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                </svg>
                知识库
            </button>
            <button class="btn btn-secondary" onclick="loadSessions()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 21"/>
                    <path d="M21 3v9h-9"/>
                    <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 3"/>
                    <path d="M8 16H3v5"/>
                </svg>
                Refresh
            </button>
            <button class="btn btn-primary" onclick="newSession()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                New Chat
            </button>
        </div>
    </div>

    <div class="chat-container">
        <!-- 知识库侧边栏 -->
        <div class="knowledge-sidebar collapsed" id="knowledgeSidebar">
            <div class="sidebar-header">
                <div class="sidebar-header-title">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                    </svg>
                    知识库
                </div>
                <button class="btn btn-sm btn-primary" onclick="showCreateKnowledgeModal()">+</button>
            </div>
            <div class="knowledge-list" id="knowledgeList">
                <!-- 知识库列表 -->
            </div>
        </div>

        <div class="sidebar">
            <div class="sidebar-header">
                Sessions
            </div>
            <div class="session-list" id="sessionList">
                <!-- Sessions loaded here -->
            </div>
        </div>

        <div class="messages-container">
            <div class="messages" id="messages">
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    </svg>
                    <p>Start a new session to begin</p>
                </div>
            </div>

            <div class="status-bar">
                <div class="status-left">
                    <span class="status-indicator" id="statusIndicator"></span>
                    <span id="statusText">已断开</span>
                </div>
                <span id="sessionInfo"></span>
            </div>

            <div class="input-container">
                <!-- 知识库选择器 -->
                <div class="knowledge-selector" id="knowledgeSelector">
                    <span class="knowledge-selector-label">启用知识库:</span>
                    <div class="knowledge-checkboxes" id="knowledgeCheckboxes">
                        <span class="text-muted">暂无知识库</span>
                    </div>
                </div>

                <div class="input-wrapper">
                    <input
                        type="text"
                        id="messageInput"
                        placeholder="输入消息... (Shift+Enter 换行，可拖拽或粘贴图片)"
                        onkeypress="handleKeyPress(event)"
                    />
                    <input type="file" id="imageInput" accept="image/*" multiple style="display: none;" onchange="handleImageFileSelect(event)" />
                    <button class="btn btn-image" onclick="document.getElementById('imageInput').click()" title="上传图片">
                        <span>🖼️</span>
                    </button>
                    <button class="btn btn-primary" onclick="sendMessage()">
                        <span>📤</span> 发送
                    </button>
                </div>
                <div class="image-preview-container" id="imagePreviewContainer"></div>
            </div>
        </div>
    </div>

    <!-- 创建知识库 Modal -->
    <div id="createKnowledgeModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>创建新知识库</h3>
                <button class="modal-close" onclick="closeCreateKnowledgeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>知识库名称</label>
                    <input type="text" id="newKnowledgeName" placeholder="例如：项目文档" />
                </div>
                <div class="form-group">
                    <label>描述（可选）</label>
                    <textarea id="newKnowledgeDesc" placeholder="简要描述知识库用途" rows="3"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeCreateKnowledgeModal()">取消</button>
                <button class="btn btn-primary" onclick="createKnowledgeBase()">创建</button>
            </div>
        </div>
    </div>

    <!-- 编辑知识库 Modal -->
    <div id="editKnowledgeModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>编辑知识库</h3>
                <button class="modal-close" onclick="closeEditKnowledgeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>知识库名称</label>
                    <input type="text" id="editKnowledgeName" placeholder="例如：项目文档" />
                </div>
                <div class="form-group">
                    <label>描述（可选）</label>
                    <textarea id="editKnowledgeDesc" placeholder="简要描述知识库用途" rows="3"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeEditKnowledgeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveEditKnowledgeBase()">保存</button>
            </div>
        </div>
    </div>

    <!-- 知识库详情 Modal -->
    <div id="knowledgeDetailModal" class="modal" style="display: none;">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h3 id="knowledgeDetailTitle">知识库详情</h3>
                <button class="modal-close" onclick="closeKnowledgeDetailModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="knowledge-detail-header">
                    <div class="knowledge-meta">
                        <span id="knowledgeDetailDesc"></span>
                    </div>
                    <div class="knowledge-actions">
                        <button class="btn btn-sm btn-secondary" onclick="uploadDocument()">📄 上传文档</button>
                        <input type="file" id="documentUploadInput" style="display: none;" onchange="handleDocumentUpload(event)" />
                        <button class="btn btn-sm btn-primary" onclick="triggerIndexing('incremental')">增量索引</button>
                        <button class="btn btn-sm btn-warning" onclick="triggerIndexing('full')">全量索引</button>
                    </div>
                </div>
                <div class="indexing-status" id="indexingStatus">
                    <!-- 索引状态 -->
                </div>
                <div class="document-list" id="documentList">
                    <!-- 文档列表 -->
                </div>
            </div>
        </div>
    </div>

    <!-- Custom App Script -->
    <script src="app.js"></script>
    <script>
        // Modal close handlers - click outside to close
        document.addEventListener('click', (e) => {
            if (e.target.id === 'createKnowledgeModal') {
                closeCreateKnowledgeModal();
            }
            if (e.target.id === 'editKnowledgeModal') {
                closeEditKnowledgeModal();
            }
            if (e.target.id === 'knowledgeDetailModal') {
                closeKnowledgeDetailModal();
            }
        });

        // Handle escape key to close modals
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeCreateKnowledgeModal();
                closeEditKnowledgeModal();
                closeKnowledgeDetailModal();
            }
        });
    </script>
</body>
</html>
